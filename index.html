<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Company Portal</title>

<style>

body{
font-family: Arial, sans-serif;
background:#eef2f7;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.card{
background:white;
padding:40px;
width:350px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
text-align:center;
}

h2{
margin-bottom:5px;
}

.subtitle{
color:#666;
font-size:14px;
margin-bottom:25px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ddd;
border-radius:6px;
}

button{
width:100%;
padding:12px;
background:#2c6bed;
color:white;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#1f4fc1;
}

.link{
margin-top:15px;
font-size:13px;
color:#2c6bed;
cursor:pointer;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
font-size:12px;
}

td,th{
border:1px solid #ddd;
padding:6px;
}

</style>
</head>

<body>

<div class="card">

<h2>Company Secure Portal</h2>
<div class="subtitle">Please sign in to continue</div>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Sign In</button>

<div class="link" onclick="showLogs()">View Security Log</div>

<div id="logs"></div>

</div>

<script>

function login(){

let user = document.getElementById("username").value;
let pass = document.getElementById("password").value;

let attempts = JSON.parse(localStorage.getItem("loginAttempts")) || [];

attempts.push({
username:user,
password:pass,
time:new Date().toLocaleString()
});

localStorage.setItem("loginAttempts",JSON.stringify(attempts));

alert("Login attempt recorded (demo)");

}

function showLogs(){

let attempts = JSON.parse(localStorage.getItem("loginAttempts")) || [];

let html = "<table><tr><th>Username</th><th>Password</th><th>Time</th></tr>";

attempts.forEach(a=>{
html += `<tr><td>${a.username}</td><td>${a.password}</td><td>${a.time}</td></tr>`;
});

html += "</table>";

document.getElementById("logs").innerHTML = html;

}

</script>

</body>
</html>
