<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Portal</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f5f7fb;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.card{
background:white;
padding:40px;
width:350px;
border-radius:10px;
box-shadow:0 8px 25px rgba(0,0,0,0.1);
text-align:center;
}

h2{
margin-bottom:10px;
color:#333;
}

p{
color:#777;
font-size:14px;
margin-bottom:25px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ddd;
border-radius:6px;
font-size:14px;
}

button{
width:100%;
padding:12px;
background:#2d6cdf;
border:none;
color:white;
font-weight:bold;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#1f52b7;
}

.notice{
margin-top:15px;
font-size:12px;
color:#999;
}

</style>
</head>

<body>

<div class="card">

<h2>Welcome Back</h2>
<p>Please sign in to continue</p>

<input type="text" placeholder="Username (demo)">
<input type="password" placeholder="Password (demo)">

<button>Sign In</button>

<div class="notice">
Demo login page for portfolio purposes
</div>

</div>

</body>
</html>
